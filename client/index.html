<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zorvyn NGO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>

<body>

  <div id="auth-container" class="auth-layout hidden">
    <!-- Auth forms injected dynamically -->
  </div>

  <div id="app-container" class="app-layout hidden">
    <nav class="sidebar glass">
      <div class="logo">
        <span class="logo-icon">🌍</span>
        <span class="logo-text">Zorvyn</span>
      </div>
      <ul class="nav-links">
        <li><a href="#/dashboard" class="active" id="nav-dashboard">📊 Dashboard</a></li>
        <li><a href="#/records" id="nav-records">📋 Fund Records</a></li>
        <li class="admin-only hidden"><a href="#/users" id="nav-users">👥 Team</a></li>
      </ul>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="avatar" id="user-avatar">?</div>
          <div class="user-details">
            <div id="user-name">Loading...</div>
            <div id="user-role" class="badge">ROLE</div>
          </div>
        </div>
        <button id="btn-logout" class="btn-icon" title="Logout">🚪</button>
      </div>
    </nav>
    <main class="main-content">
      <div id="page-content"></div>
    </main>
  </div>

  <div id="toast-container"></div>
  <div id="modal-container"></div>

  <script type="module" src="/js/api.js"></script>
  <script type="module" src="/js/utils.js"></script>
  <script type="module" src="/js/auth.js"></script>
  <script type="module" src="/js/dashboard.js"></script>
  <script type="module" src="/js/records.js"></script>
  <script type="module" src="/js/users.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>

</html>
